version: 2
updates:
  # Keep SHA-pinned GitHub Actions current automatically. Dependabot bumps the
  # commit SHA *and* rewrites the trailing "# vX.Y.Z" version comment, so pins
  # stay reproducible and tamper-proof without manual SHA lookups.
  #
  # Note: this does NOT cover the ASH tool, which is installed via
  # `pip install git+https://github.com/awslabs/automated-security-helper.git@v3`
  # inside a run step (a floating tag, not a tracked action).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Batch all action bumps into a single weekly PR to minimize review noise.
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions

  # Root CDK app dependencies (aws-cdk-lib, constructs, cdk-nag, typescript,
  # jest, etc.). Grouped into one weekly PR to keep review noise low.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Keep the CDK CLI and library (plus constructs) in a single PR: they are
      # version-coupled — aws-cdk-lib's cloud-assembly schema must be readable
      # by the aws-cdk CLI. NOTE: grouping only batches *version* updates. A
      # security advisory affecting just one of them can still bump it alone
      # (Dependabot only touches packages with an update/advisory), so the
      # "Validate CDK synthesis" CI check remains the real guard against
      # lib/CLI schema drift.
      aws-cdk:
        patterns:
          - "aws-cdk"
          - "aws-cdk-lib"
          - "constructs"
      npm:
        patterns:
          - "*"
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - npm
    ignore:
      # Hold cdk-nag on v2.x: v3 is a breaking rewrite (IAspect ->
      # IPolicyValidationPlugin, and NagSuppressions -> per-finding
      # Validations.acknowledge). Deferred until upstream supports prefix/bulk
      # acknowledgment. Minor/patch (2.x) updates still flow; unignore when
      # ready to do the v3 migration.
      - dependency-name: "cdk-nag"
        update-types: ["version-update:semver-major"]
      # Keep @types/node aligned with the Node.js runtime major we target
      # (currently 24); bump it deliberately when the runtime moves rather than
      # chasing the newest typings. Minor/patch within the major still flow.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    # The blueprints are local file: deps (file:blueprints/*); Dependabot
    # ignores those automatically. Blockchain client versions are managed
    # separately via the @version-update workflow, not here.

  # Documentation website (Docusaurus) dependencies.
  - package-ecosystem: npm
    directory: "/website"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      website:
        patterns:
          - "*"
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - website
    ignore:
      # uuid is vulnerable only via webpack-dev-server -> sockjs, the dev/build
      # server behind `docusaurus start`. It is NOT included in the
      # `docusaurus build` static output that ships, so it does not reach the
      # deployed site. sockjs pins uuid ^8.3.2 and the lowest non-vulnerable
      # uuid is 14.0.0, so there is no in-range fix and Dependabot's security
      # update errors out (security_update_not_possible). Ignore it until
      # Docusaurus / webpack-dev-server move off the vulnerable uuid.
      - dependency-name: "uuid"
