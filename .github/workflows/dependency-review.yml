name: Dependency Review

on: [pull_request]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail PRs that introduce dependencies with known HIGH or CRITICAL
          # vulnerabilities. "moderate" is intentionally not blocking to avoid
          # noise from transitive advisories; those still appear in the PR summary.
          fail-on-severity: high
          comment-summary-in-pr: always
