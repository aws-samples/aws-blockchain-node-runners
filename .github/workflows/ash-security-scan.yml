name: ASH Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        # SHA-pinned: tj-actions/changed-files was the target of a supply-chain
        # compromise (CVE-2025-30066) where version tags were retroactively
        # repointed to a malicious commit. Pinning to an immutable commit SHA is
        # the documented mitigation. Bump deliberately, never via a floating tag.
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            **/*.ts
            **/*.mts
            **/*.cts
            **/*.js
            **/*.mjs
            **/*.cjs
            **/*.json
            **/*.yaml
            **/*.yml
            **/*.sh
            **/*.mdx
            **/*.md
            **/Dockerfile*
            **/package*.json
            # Blockchain node configs frequently embed RPC endpoints, keys, or
            # seed phrases. Include all .env sample variants so secret scanners
            # (detect-secrets via ASH) inspect them on change.
            **/.env*
            **/*.env*

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v4.7.1
        with:
          python-version: '3.10'

      - name: Install ASH
        if: steps.changed-files.outputs.any_changed == 'true'
        # Use the floating @v3 tag, which awslabs maintains to always point at the
        # latest stable v3.x release. This keeps ASH current with zero maintenance
        # (Dependabot can't track this pip git ref). Trade-off: builds aren't fully
        # reproducible — pin a specific tag (e.g. @v3.5.3) if you need that.
        run: pip install git+https://github.com/awslabs/automated-security-helper.git@v3

      - name: Create temp directory for changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        # Pass the file list through the environment instead of inline ${{ }}
        # expansion. The list is derived from PR-controlled file names, so direct
        # interpolation into a shell command is a script-injection vector.
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          mkdir -p /tmp/ash-scan
          echo "Changed files for security scan:"
          echo "$ALL_CHANGED_FILES" | tr ' ' '\n'

      - name: Copy changed files to temp directory
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          for file in $ALL_CHANGED_FILES; do
            if [ -f "$file" ]; then
              mkdir -p "/tmp/ash-scan/$(dirname "$file")"
              cp "$file" "/tmp/ash-scan/$file"
              echo "Copied for scan: $file"
            fi
          done

      - name: Run ASH scan on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # Stage our custom prompt-injection Semgrep rules inside the scan dir so
          # ASH's bundled Semgrep scanner can load them. The container mounts this
          # directory, so a path relative to the scan root resolves inside it.
          # The rule file lives in the repo (version-controlled) but isn't part of
          # the copied changed-file set, so copy it in explicitly.
          mkdir -p /tmp/ash-scan/.ash/semgrep-rules
          cp "$GITHUB_WORKSPACE/.github/semgrep/prompt-injection.yml" \
             /tmp/ash-scan/.ash/semgrep-rules/prompt-injection.yml

          cd /tmp/ash-scan
          cat > .ash_config.yaml << 'EOF'
          reporters:
            markdown:
              enabled: true
              options:
                include_detailed_findings: true
                max_detailed_findings: 100
            # flat-json is ASH's native machine-readable report. The
            # prompt-injection gate below parses it (reports/ash.flat.json) to
            # decide, per rule ID, whether to block. Enabling reporters here
            # overrides ASH's defaults, so it must be listed explicitly.
            flat-json:
              enabled: true
          scanners:
            semgrep:
              enabled: true
              options:
                # Keep ASH's default CI ruleset and add our custom prompt-injection
                # rules. The custom rules are path-scoped (docs/ageai-*.md and
                # .kiro/prompts/*.md) via paths.include, so they only evaluate the
                # prompt files when those files are part of the PR diff.
                rules:
                  - 'p/ci'
                  - '.ash/semgrep-rules/prompt-injection.yml'
          EOF
          ash --mode container --config .ash_config.yaml 2>&1 | tee /tmp/ash-output.log
        # Kept non-blocking on purpose: a raw ASH exit code can't tell "found a
        # finding" from "the scanner crashed". All findings are surfaced as a PR
        # comment by the companion "ASH Security Scan - Post Comments" workflow.
        # The explicit "Prompt-injection gate" step below makes the only blocking
        # decision — narrowly, on the four ERROR-severity prompt-injection rules —
        # by parsing the flat-json report, so infra flakiness never masquerades as
        # a clean pass.
        continue-on-error: true

      - name: Process scan results
        if: steps.changed-files.outputs.any_changed == 'true'
        id: process-results
        env:
          CHANGED_FILES_COUNT: ${{ steps.changed-files.outputs.all_changed_files_count }}
        run: |
          SUMMARY_FILE="/tmp/pr_comment.md"

          echo "## 🔒 Security Scan Results" > "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"
          echo "**Scanned files:** ${CHANGED_FILES_COUNT}" >> "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"

          if [ -f "/tmp/ash-output.log" ]; then
            TABLE_START=$(grep -n "ASH Scan Results Summary" /tmp/ash-output.log | head -1 | cut -d: -f1 || echo "0")
            TABLE_END=$(grep -n "source-dir:" /tmp/ash-output.log | head -1 | cut -d: -f1 || echo "0")

            if [ "$TABLE_START" != "0" ] && [ "$TABLE_END" != "0" ] && [ "$TABLE_END" -gt "$TABLE_START" ]; then
              echo "| Scanner | S | C | H | M | L | I | Result |" >> "$SUMMARY_FILE"
              echo "|---------|---|---|---|---|---|---|--------|" >> "$SUMMARY_FILE"
              sed -n "${TABLE_START},${TABLE_END}p" /tmp/ash-output.log | \
              sed 's/\x1b\[[0-9;]*m//g' | \
              grep "^│" | \
              sed 's/│/|/g' | \
              sed 's/^ *|/|/' | \
              sed 's/| *$/|/' >> "$SUMMARY_FILE"
              echo "" >> "$SUMMARY_FILE"
            fi

            if grep -q "Actionable findings detected!" /tmp/ash-output.log; then
              echo "has_findings=true" >> $GITHUB_OUTPUT
              echo "⚠️ **Security findings detected.** Please review and address before merging." >> "$SUMMARY_FILE"
            else
              echo "has_findings=false" >> $GITHUB_OUTPUT
              echo "✅ **No security issues found.**" >> "$SUMMARY_FILE"
            fi
          fi

      - name: Save PR number for comment workflow
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "${{ github.event.pull_request.number }}" > /tmp/pr_number.txt
          echo "${{ github.event.pull_request.head.sha }}" > /tmp/pr_sha.txt

      - name: Upload scan results
        if: always() && steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ash-security-results
          path: |
            /tmp/ash-output.log
            /tmp/pr_comment.md
            /tmp/pr_number.txt
            /tmp/pr_sha.txt
          retention-days: 7

      # Narrow blocking gate. Runs AFTER the artifact upload so the companion
      # comment workflow still receives its input even when this step fails the
      # job. Only the four ERROR-severity prompt-injection rules block; the
      # WARNING jailbreak rule and every other ASH finding stay advisory
      # (surfaced in the PR comment). The gate can only ever fire on PRs that
      # modify AI prompt files (docs/ageai-*.md, .kiro/prompts/*.md) — the same
      # paths the custom rules are scoped to — so it has near-zero blast radius
      # for unrelated contributions.
      - name: Prompt-injection gate
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          set -euo pipefail

          # The four ERROR-severity rule IDs from
          # .github/semgrep/prompt-injection.yml. The fifth rule
          # (prompt-injection-jailbreak-or-safety-bypass, WARNING) is
          # intentionally excluded — it is the fuzziest matcher and stays
          # advisory-only.
          BLOCKING_RULES='prompt-injection-instruction-override|prompt-injection-reveal-system-prompt|prompt-injection-hide-from-user|prompt-injection-secret-exfiltration'

          # Did this PR touch any in-scope AI prompt file? Mirror the rules'
          # paths.include globs. The gate only engages when it did.
          PROMPT_FILES_CHANGED=false
          for f in $ALL_CHANGED_FILES; do
            case "$f" in
              docs/ageai-*.md|.kiro/prompts/*.md) PROMPT_FILES_CHANGED=true ;;
            esac
          done

          if [ "$PROMPT_FILES_CHANGED" != "true" ]; then
            echo "No AI prompt files changed — prompt-injection gate not applicable."
            exit 0
          fi

          echo "AI prompt file(s) changed — enforcing prompt-injection gate."

          # ASH writes its native machine-readable report here. Locate it rather
          # than hard-coding the full path so a minor ASH layout change doesn't
          # silently break the gate.
          FLAT_JSON=$(find /tmp/ash-scan -type f -name 'ash.flat.json' 2>/dev/null | head -1 || true)

          # Distinguish "scan failed to run" from "scan found nothing". A PR that
          # edits a prompt file MUST have a parseable report; if it doesn't, the
          # scan didn't actually vet the prompt — fail closed instead of treating
          # a non-existent result as a clean pass.
          if [ -z "$FLAT_JSON" ] || [ ! -s "$FLAT_JSON" ] || ! jq -e . "$FLAT_JSON" >/dev/null 2>&1; then
            echo "::error::ASH produced no parseable results for a PR that modified AI prompt files. This is a scan-failed-to-run state, not a clean pass. Re-run the scan; if it keeps failing, investigate before merging."
            exit 1
          fi

          # Count non-suppressed findings from the blocking rule IDs. Matching on
          # both rule_id and title guards against scanner-specific id namespacing.
          # is_suppressed == true means an inline `nosemgrep: <rule-id>` accepted
          # the finding — those do not block (the auditable escape hatch).
          HITS=$(jq --arg re "$BLOCKING_RULES" '
            [ .findings[]
              | select(.is_suppressed != true)
              | select(((.rule_id // "") | test($re)) or ((.title // "") | test($re)))
            ] | length
          ' "$FLAT_JSON")

          if [ "${HITS:-0}" -gt 0 ]; then
            echo "::error::Prompt-injection finding(s) detected in an AI prompt file (${HITS} blocking). Review the flagged content. If it is a legitimate false positive, add an inline 'nosemgrep: <rule-id>' comment with justification on the offending line."
            echo "Blocking findings:"
            jq -r --arg re "$BLOCKING_RULES" '
              .findings[]
              | select(.is_suppressed != true)
              | select(((.rule_id // "") | test($re)) or ((.title // "") | test($re)))
              | "  - \(.rule_id // .title) @ \(.file_path // "?"):\(.line_start // "?")"
            ' "$FLAT_JSON"
            exit 1
          fi

          echo "✅ No blocking prompt-injection findings in changed prompt files."

      - name: Skip message
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "⏭️ No scannable files changed — skipping security scan"
