# Bitcoin Core - Full Node Configuration
# This file is used as a reference by node.sh; Bitcoin Core runs as a native binary, not Docker.
# The client version is derived from the configuration file name (single source of truth).
client: bitcoin-core
sync_mode: full
node_type: rpc
binary_source: bitcoincore.org
geth_flags:
  - "-txindex=1"
  - "-dbcache=4096"
  - "-maxmempool=300"
  - "-maxconnections=125"
  - "-server=1"
